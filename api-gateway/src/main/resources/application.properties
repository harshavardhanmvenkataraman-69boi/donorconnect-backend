#spring.application.name=api-gateway
#
#
## ============================================
## API Gateway Configuration
## ============================================
#server.port=7069
## ============================================
## Eureka Client
## ============================================
#eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
#eureka.instance.prefer-ip-address=true
#eureka.instance.instance-id=${spring.application.name}:${server.port}
#
## ============================================
## JWT Configuration (same secret as IAM)
## ============================================
#app.jwt.secret=donorConnectSuperSecretKey2024@donorConnectSuperSecretKey2024
#app.jwt.expiration=86400000
## ============================================
## CORS Configuration (single source of truth)
## ============================================
#spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:3000
#spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS,PATCH
#spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
#spring.cloud.gateway.globalcors.cors-configurations.[/**].exposedHeaders=Authorization
#spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true
#spring.cloud.gateway.globalcors.cors-configurations.[/**].maxAge=3600
#
## Deduplicate CORS headers from downstream IAM service
#spring.cloud.gateway.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials Access-Control-Allow-Methods Access-Control-Allow-Headers, RETAIN_FIRST
#
## ============================================
## Actuator
## ============================================
#management.endpoints.web.exposure.include=health,gateway
#management.endpoint.gateway.enabled=true
#
## ============================================
## Logging
## ============================================
#logging.level.org.springframework.cloud.gateway=DEBUG
#logging.level.com.buildsmart.gateway=DEBUG
#
## ============================================
## Springdoc / Swagger UI Aggregation (Reactive Gateway)
## ============================================
#springdoc.swagger-ui.enabled=true
#springdoc.swagger-ui.path=/swagger-ui.html
#springdoc.swagger-ui.operations-sorter=method
#springdoc.swagger-ui.tags-sorter=alpha
#springdoc.api-docs.path=/v1/api-docs
#
## Per-service docs URLs for aggregation in Swagger UI
#springdoc.swagger-ui.urls[0].name=Auth Service
#springdoc.swagger-ui.urls[0].url=/v1/api-docs/auth-service
#
#springdoc.swagger-ui.urls[1].name=Donor Service
#springdoc.swagger-ui.urls[1].url=/v1/api-docs/donor-service
#
#springdoc.swagger-ui.urls[2].name=Blood Supply Service
#springdoc.swagger-ui.urls[2].url=/v1/api-docs/blood-supply-service
#
#springdoc.swagger-ui.urls[3].name=Transfusion Service
#springdoc.swagger-ui.urls[3].url=/v1/api-docs/transfusion-service
#
#springdoc.swagger-ui.urls[4].name=Inventory Service
#springdoc.swagger-ui.urls[4].url=/v1/api-docs/inventory-service
#
#springdoc.swagger-ui.urls[5].name=Safety Service
#springdoc.swagger-ui.urls[5].url=/v1/api-docs/safety-service
#
#springdoc.swagger-ui.urls[6].name=Billing Service
#springdoc.swagger-ui.urls[6].url=/v1/api-docs/billing-service
#
#springdoc.swagger-ui.urls[7].name=Reporting Service
#springdoc.swagger-ui.urls[7].url=/v1/api-docs/reporting-service
#
#springdoc.swagger-ui.urls[8].name=Notification Service
#springdoc.swagger-ui.urls[8].url=/v1/api-docs/notification-service


spring.application.name=api-gateway
spring.config.import=optional:configserver:http://localhost:8888
spring.cloud.config.fail-fast=false