server:
  port: 8080  # Use 443 with TLS in production

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=2

        - id: donor-service
          uri: lb://donor-service
          predicates:
            - Path=/api/donors/**
          filters:
            - StripPrefix=2

        - id: blood-supply-service
          uri: lb://blood-supply-service
          predicates:
            - Path=/api/blood/**
          filters:
            - StripPrefix=2

        - id: transfusion-service
          uri: lb://transfusion-service
          predicates:
            - Path=/api/transfusion/**
          filters:
            - StripPrefix=2

        - id: safety-service
          uri: lb://safety-service
          predicates:
            - Path=/api/safety/**
          filters:
            - StripPrefix=2

        - id: billing-service
          uri: lb://billing-service
          predicates:
            - Path=/api/billing/**
          filters:
            - StripPrefix=2

        - id: reporting-service
          uri: lb://reporting-service
          predicates:
            - Path=/api/reports/**
          filters:
            - StripPrefix=2

        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**
          filters:
            - StripPrefix=2

        - id: config-service
          uri: lb://config-service
          predicates:
            - Path=/api/config/**
          filters:
            - StripPrefix=2

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
