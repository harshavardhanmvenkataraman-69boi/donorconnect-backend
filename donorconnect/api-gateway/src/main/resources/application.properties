spring.application.name=ApiGatewayApplication


# ============================================
# API Gateway Configuration
# ============================================
server.port=8081
# ============================================
# Eureka Client
# ============================================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

# ============================================
# JWT Configuration (same secret as IAM)
# ============================================
app.jwt.secret=donorConnectSuperSecretKey2024@donorConnectSuperSecretKey2024
app.jwt.expiration=86400000
# ============================================
# CORS Configuration (single source of truth)
# ============================================
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:3000
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].exposedHeaders=Authorization
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].maxAge=3600

# Deduplicate CORS headers from downstream IAM service
spring.cloud.gateway.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials Access-Control-Allow-Methods Access-Control-Allow-Headers, RETAIN_FIRST

# ============================================
# Actuator
# ============================================
management.endpoints.web.exposure.include=health,gateway
management.endpoint.gateway.enabled=true

# ============================================
# Logging
# ============================================
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.com.buildsmart.gateway=DEBUG
