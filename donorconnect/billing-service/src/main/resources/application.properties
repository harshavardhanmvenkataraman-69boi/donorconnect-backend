# =========================================================
# Billing Service — DonorConnect
# Reference-based billing layer per the design spec.
#
# Primary config is pulled from config-server (configs/billing-service.properties
# and configs/application.properties). The values below are local fallbacks so
# the service still starts when config-server is down — keeping them in sync
# with the config-server copies is important.
# =========================================================

spring.application.name=billing-service
spring.config.import=optional:configserver:http://localhost:8888
spring.cloud.config.fail-fast=false

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

# ── Local fallbacks (overridden by config-server when reachable) ─────────────
server.port=8006

spring.datasource.url=jdbc:mysql://localhost:3306/billing_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT secret — matches the value in config-server/configs/application.properties
# so tokens issued by auth-service verify here even without config-server.
app.jwt.secret=donorConnectSuperSecretKey2024@donorConnectSuperSecretKey2024

spring.data.web.pageable.default-page-size=10
spring.data.web.pageable.max-page-size=100
spring.cloud.compatibility-verifier.enabled=false
