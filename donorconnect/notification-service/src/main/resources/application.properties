# ============================================================
# NOTIFICATION SERVICE - APPLICATION CONFIGURATION
# Primary config pulled from Spring Cloud Config Server.
# Values here are local-dev fallbacks only.
# ============================================================

# --- Application & Config Server ----------------------------
spring.application.name=notification-service
spring.config.import=optional:configserver:http://localhost:8888
spring.cloud.config.fail-fast=true

# --- Server -------------------------------------------------
server.port=8008

# --- Datasource ---------------------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/notification_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA/Hibernate ------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Disable SQL init — schema is managed by Hibernate DDL, not SQL scripts.
spring.sql.init.mode=never

# --- Kafka --------------------------------------------------
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=notification-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.max-poll-records=100
spring.kafka.consumer.session-timeout-ms=30000
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3

# Toggle to disable all Kafka consumers (useful for local testing without Kafka)
app.kafka.enabled=true

# --- Service Discovery (Eureka) -----------------------------
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}
eureka.client.initial-instance-info-replication-interval-seconds=5
eureka.client.instance-info-replication-interval-seconds=10

# --- Swagger/SpringDoc OpenAPI ------------------------------
springdoc.api-docs.path=/v1/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.use-root-path=true

# --- Actuator -----------------------------------------------
management.endpoints.web.exposure.include=health,info,metrics,loggers
management.endpoint.health.show-details=always
management.info.env.enabled=true
management.metrics.enable.jvm=true

# --- Logging ------------------------------------------------
logging.level.root=INFO
logging.level.com.donorconnect.notificationservice=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.springframework.kafka=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# --- JWT Security -------------------------------------------
app.jwt.secret=donorConnectSuperSecretKey2024@donorConnectSuperSecretKey2024
app.jwt.expiration=86400000

# --- Pagination Defaults ------------------------------------
spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.max-page-size=100
spring.data.web.pageable.one-indexed-parameters=false

# --- Jackson ------------------------------------------------
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.indent-output=true
