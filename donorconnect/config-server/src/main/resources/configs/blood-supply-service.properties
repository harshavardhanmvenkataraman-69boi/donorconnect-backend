# =============================================
# BLOOD SUPPLY SERVICE CONFIG
# =============================================
server.port=8003

spring.datasource.url=jdbc:mysql://localhost:3306/blood-supply-service_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

logging.level.com.donorconnect.bloodsupplyservice=DEBUG
logging.level.org.springframework.security=INFO

app.expiry.warning-days=3

spring.cloud.openfeign.circuitbreaker.enabled=true
resilience4j.circuitbreaker.instances.inventory-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.inventory-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.inventory-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.inventory-service.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.inventory-service.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.timelimiter.instances.inventory-service.timeout-duration=3s