# =============================================
# API GATEWAY CONFIG
# =============================================
server.port=7069

# CORS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:3000
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].exposedHeaders=Authorization
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].maxAge=3600

spring.cloud.gateway.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials Access-Control-Allow-Methods Access-Control-Allow-Headers, RETAIN_FIRST

# Springdoc Swagger aggregation
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.api-docs.path=/v1/api-docs

springdoc.swagger-ui.urls[0].name=Auth Service
springdoc.swagger-ui.urls[0].url=/v1/api-docs/auth-service
springdoc.swagger-ui.urls[1].name=Donor Service
springdoc.swagger-ui.urls[1].url=/v1/api-docs/donor-service
springdoc.swagger-ui.urls[2].name=Blood Supply Service
springdoc.swagger-ui.urls[2].url=/v1/api-docs/blood-supply-service
springdoc.swagger-ui.urls[3].name=Transfusion Service
springdoc.swagger-ui.urls[3].url=/v1/api-docs/transfusion-service
springdoc.swagger-ui.urls[4].name=Inventory Service
springdoc.swagger-ui.urls[4].url=/v1/api-docs/inventory-service
springdoc.swagger-ui.urls[5].name=Safety Service
springdoc.swagger-ui.urls[5].url=/v1/api-docs/safety-service

# Logging
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.com.donorconnect.gateway=DEBUG
